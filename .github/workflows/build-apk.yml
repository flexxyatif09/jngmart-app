name: Build Signed APK â€“ JNGMart

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          elif [ -f "tmart.html" ]; then
            cp tmart.html www/index.html
          fi

      - name: Add & Sync Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate App Icons from SVG
        run: |
          SVG="icon.svg"
          if [ ! -f "$SVG" ]; then
            echo "icon.svg nahi mila â€” skip"
            exit 0
          fi

          declare -A ICONS=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for folder in "${!ICONS[@]}"; do
            size="${ICONS[$folder]}"
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            rsvg-convert -w $size -h $size "$SVG" > "$dir/ic_launcher.png"
            rsvg-convert -w $size -h $size "$SVG" > "$dir/ic_launcher_round.png"
            echo "âœ… $folder â†’ ${size}x${size}"
          done

          # Splash screen 2048x2048
          for folder in drawable drawable-land drawable-port; do
            dir="android/app/src/main/res/$folder"
            mkdir -p "$dir"
            rsvg-convert -w 2048 -h 2048 "$SVG" > "$dir/splash.png"
          done

          mkdir -p dist
          rsvg-convert -w 512 -h 512 "$SVG" > dist/playstore-icon.png
          echo "âœ… All icons generated!"

      - name: Setup Splash Screen in Android
        run: |
          # splash colors style
          STYLES="android/app/src/main/res/values/styles.xml"
          mkdir -p android/app/src/main/res/values
          cat > $STYLES << 'STYLES_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:background">@drawable/splash</item>
              <item name="colorPrimary">#1a9e3a</item>
              <item name="colorPrimaryDark">#157d2e</item>
              <item name="colorAccent">#1a9e3a</item>
              <item name="android:windowSplashScreenBackground">#1a9e3a</item>
            </style>
            <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
              <item name="android:background">@drawable/splash</item>
            </style>
          </resources>
          STYLES_EOF
          echo "âœ… Splash screen styles added!"

      - name: Add All Permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.CALL_PHONE" />\n    <uses-permission android:name="android.permission.READ_PHONE_STATE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n</manifest>|' $MANIFEST
          echo "âœ… Permissions added!"

      - name: Decode Keystore from Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/jngmart.keystore

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/jngmart.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             dist/JNGMart-v${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JNGMart-APK-v${{ github.run_number }}
          path: dist/
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: JNGMart v${{ github.run_number }}
          body: |
            ðŸš€ JNGMart Auto Build v${{ github.run_number }}
          files: dist/JNGMart-v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

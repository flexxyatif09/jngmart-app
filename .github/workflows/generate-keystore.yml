name: Generate Keystore (Sirf Ek Baar)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore jngmart.keystore \
            -alias jngmart \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jngmart123 \
            -keypass jngmart123 \
            -dname "CN=JNGMart, OU=App, O=JNGMart, L=India, S=India, C=IN"

      - name: Print Base64 (Copy This!)
        run: |
          echo "════════════════════════════════════"
          echo "KEYSTORE_BASE64 VALUE — COPY KARO:"
          echo "════════════════════════════════════"
          base64 -w 0 jngmart.keystore
          echo ""
          echo "════════════════════════════════════"

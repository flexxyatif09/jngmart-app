<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22b545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#157d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="1024" height="512" rx="220" ry="220" fill="url(#shine)"/>

  <!-- Cart body -->
  <rect x="310" y="520" width="420" height="260" rx="40" ry="40" fill="white" opacity="0.95"/>

  <!-- Cart handle/bar -->
  <path d="M260 380 L310 520 L730 520 L780 380 Z" fill="white" opacity="0.9"/>

  <!-- Cart wheels -->
  <circle cx="390" cy="820" r="52" fill="white" opacity="0.95"/>
  <circle cx="390" cy="820" r="28" fill="#1a9e3a"/>
  <circle cx="650" cy="820" r="52" fill="white" opacity="0.95"/>
  <circle cx="650" cy="820" r="28" fill="#1a9e3a"/>

  <!-- Cart pole -->
  <rect x="240" y="360" width="50" height="180" rx="25" fill="white" opacity="0.9"/>

  <!-- Leaf on top of cart -->
  <path d="M512 150 
           C512 150, 650 200, 670 340 
           C670 420, 600 460, 512 440
           C424 460, 354 420, 354 340
           C354 200, 512 150, 512 150 Z" 
        fill="white" opacity="0.95"/>

  <!-- Leaf stem -->
  <path d="M512 440 Q512 500 512 520" 
        stroke="white" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Leaf vein center -->
  <path d="M512 190 Q512 300 512 430" 
        stroke="#1a9e3a" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Leaf veins left -->
  <path d="M512 240 Q470 270 400 290" 
        stroke="#1a9e3a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M512 300 Q460 320 390 330" 
        stroke="#1a9e3a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M512 360 Q470 370 420 375" 
        stroke="#1a9e3a" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Leaf veins right -->
  <path d="M512 240 Q554 270 624 290" 
        stroke="#1a9e3a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M512 300 Q564 320 634 330" 
        stroke="#1a9e3a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M512 360 Q554 370 604 375" 
        stroke="#1a9e3a" stroke-width="6" stroke-linecap="round" fill="none"/>
</svg>